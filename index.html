<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Matrice d'Eisenhower</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1e1e2f;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 { margin: 20px; }

.form {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

input, button {
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.matrix {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  width: 90%;
  height: 60vh;
  gap: 10px;
}

.quadrant {
  padding: 10px;
  border-radius: 12px;
  overflow-y: auto;
}

#q1 { background: #ff6b6b; }
#q2 { background: #ffd93d; color: black; }
#q3 { background: #ff922b; }
#q4 { background: #868e96; }

.task {
  background: white;
  color: black;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.actions {
  display: flex;
  gap: 5px;
}

.actions button {
  padding: 5px;
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
}

/* ARCHIVE */
#archive {
  width: 90%;
  margin-top: 20px;
  padding: 10px;
  background: #222;
  border-radius: 10px;
}

.archive-task {
  display: flex;
  justify-content: space-between;
  background: #444;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>Matrice d'Eisenhower</h1>

<div class="form">
  <input type="text" id="taskInput" placeholder="Tâche">
  <input type="date" id="deadline">

  <label><input type="checkbox" id="important"> Important</label>
  <label><input type="checkbox" id="urgent"> Urgent</label>

  <button onclick="addTask()">Ajouter</button>
</div>

<div class="matrix">
  <div class="quadrant" id="q2"><h2>🟡 Important / Pas urgent</h2></div>
  <div class="quadrant" id="q1"><h2>🔴 Important / Urgent</h2></div>
  <div class="quadrant" id="q4"><h2>⚫ Pas important / Pas urgent</h2></div>
  <div class="quadrant" id="q3"><h2>🟠 Pas important / Urgent</h2></div>
</div>

<div id="archive">
  <h2>📁 Terminées</h2>
  <div id="archiveList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function getPriority(date) {
  const today = new Date();
  const d = new Date(date);
  return d - today;
}

function render() {

  document.querySelectorAll(".quadrant").forEach(q => {
    const title = q.querySelector("h2").outerHTML;
    q.innerHTML = title;
  });

  document.getElementById("archiveList").innerHTML = "";

  // ⏱ TRI PAR DATE (urgent en premier)
  const sorted = [...tasks].sort((a, b) => {
    if (a.done && !b.done) return 1;
    if (!a.done && b.done) return -1;
    return getPriority(a.deadline) - getPriority(b.deadline);
  });

  sorted.forEach((task, index) => {

    if (task.done) {
      const a = document.createElement("div");
      a.className = "archive-task";
      a.innerHTML = `
        <span>✔ ${task.text}</span>
        <button>↩</button>
      `;

      a.querySelector("button").onclick = () => {
        task.done = false;
        save();
        render();
      };

      document.getElementById("archiveList").appendChild(a);
      return;
    }

    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <span>
        ${task.text}
        <small>(${task.deadline || "sans date"})</small>
      </span>

      <div class="actions">
        <button class="check">✔</button>
        <button class="edit">✏</button>
        <button class="delete">🗑</button>
      </div>
    `;

    // ✔ TERMINÉ
    div.querySelector(".check").onclick = () => {
      task.done = true;
      save();
      render();
    };

    // ✏ EDIT
    div.querySelector(".edit").onclick = () => {
      const newText = prompt("Modifier :", task.text);
      if (newText) task.text = newText;

      const newDate = prompt("Date (YYYY-MM-DD) :", task.deadline);
      if (newDate) task.deadline = newDate;

      save();
      render();
    };

    // 🗑 DELETE
    div.querySelector(".delete").onclick = () => {
      tasks = tasks.filter(t => t !== task);
      save();
      render();
    };

    document.getElementById(task.quadrant).appendChild(div);
  });
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const deadline = document.getElementById("deadline").value;
  const important = document.getElementById("important").checked;
  const urgent = document.getElementById("urgent").checked;

  if (!text) return;

  let quadrant;

  if (important && urgent) quadrant = "q1";
  else if (important) quadrant = "q2";
  else if (urgent) quadrant = "q3";
  else quadrant = "q4";

  tasks.push({
    text,
    deadline,
    quadrant,
    done: false
  });

  save();
  render();

  document.getElementById("taskInput").value = "";
}

render();
</script>

</body>
</html>
