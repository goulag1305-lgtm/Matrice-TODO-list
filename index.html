<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Matrice d'Eisenhower</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1e1e2f;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  margin: 20px;
}

.form {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

input, button {
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.matrix {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  width: 90%;
  height: 70vh;
  gap: 12px;
}

.quadrant {
  padding: 10px;
  border-radius: 12px;
  overflow-y: auto;
}

#q1 { background: #ff6b6b; }
#q2 { background: #ffd93d; color: black; }
#q3 { background: #ff922b; }
#q4 { background: #868e96; }

.task {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
  cursor: grab;
  transition: 0.2s;
}

.task:hover {
  transform: scale(1.03);
}

.task.dragging {
  opacity: 0.5;
}

h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<h1>Matrice d'Eisenhower</h1>

<div class="form">
  <input type="text" id="taskInput" placeholder="Nouvelle tâche">
  <label><input type="checkbox" id="important"> Important</label>
  <label><input type="checkbox" id="urgent"> Urgent</label>
  <button onclick="addTask()">Ajouter</button>
</div>

<div class="matrix">
  <div class="quadrant" id="q2"><h2>🟡 Important / Pas urgent</h2></div>
  <div class="quadrant" id="q1"><h2>🔴 Important / Urgent</h2></div>
  <div class="quadrant" id="q4"><h2>⚫ Pas important / Pas urgent</h2></div>
  <div class="quadrant" id="q3"><h2>🟠 Pas important / Urgent</h2></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function createTaskElement(task, index) {
  const div = document.createElement("div");
  div.className = "task";
  div.innerText = task.text;
  div.draggable = true;

  // Drag start
  div.addEventListener("dragstart", () => {
    div.classList.add("dragging");
    div.dataset.index = index;
  });

  div.addEventListener("dragend", () => {
    div.classList.remove("dragging");
  });

  // Edit au double clic
  div.ondblclick = () => {
    const newText = prompt("Modifier la tâche :", task.text);
    if (newText) {
      tasks[index].text = newText;
      save();
      render();
    }
  };

  // Supprimer clic droit
  div.oncontextmenu = (e) => {
    e.preventDefault();
    tasks.splice(index, 1);
    save();
    render();
  };

  return div;
}

function render() {
  document.querySelectorAll(".quadrant").forEach(q => {
    const title = q.querySelector("h2").outerHTML;
    q.innerHTML = title;
  });

  tasks.forEach((task, index) => {
    const el = createTaskElement(task, index);
    document.getElementById(task.quadrant).appendChild(el);
  });
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const important = document.getElementById("important").checked;
  const urgent = document.getElementById("urgent").checked;

  if (!text) return;

  let quadrant;
  if (important && urgent) quadrant = "q1";
  else if (important) quadrant = "q2";
  else if (urgent) quadrant = "q3";
  else quadrant = "q4";

  tasks.push({ text, quadrant });

  save();
  render();

  document.getElementById("taskInput").value = "";
}

document.querySelectorAll(".quadrant").forEach(q => {
  q.addEventListener("dragover", e => e.preventDefault());

  q.addEventListener("drop", e => {
    const dragged = document.querySelector(".dragging");
    const index = dragged.dataset.index;

    tasks[index].quadrant = q.id;

    save();
    render();
  });
});

render();
</script>

</body>
</html>
